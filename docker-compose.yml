version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: dms_email
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: app
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    depends_on:
      - postgres
      - redis
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
